# Publishes the static game at master_connections/webapp/ to GitHub Pages.
# Repo: Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Silence Node 20 deprecation until all actions default to Node 24 (optional; harmless if redundant).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: master_connections/webapp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
